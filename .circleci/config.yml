version: 2.1
executors:
  ruby_image:
    docker:
      - image: mockdeep/better:0.4
        environment:
          BUNDLE_JOBS: 3
          BUNDLE_RETRY: 3
          BUNDLE_PATH: vendor/bundle
          PGHOST: 127.0.0.1
          PGUSER: postgres
          RAILS_ENV: test
          BETTER_S3_ACCESS_KEY_ID: trash
          BETTER_S3_SECRET_ACCESS_KEY: trash
          DEBIAN_FRONTEND: noninteractive
      - image: circleci/postgres:9.2-alpine-ram
        environment:
          POSTGRES_USER: postgres
          POSTGRES_DB: app_test
          POSTGRES_PASSWORD:

    working_directory: ~/app

commands:
  setup_environment:
    steps:
      - checkout

      - run:
          name: Which versions?
          command: |
            source /usr/share/rvm/scripts/rvm
            rvm use 1.8.7 --default --install
            ruby -v
            gem -v
            bundle -v

      # https://circleci.com/docs/2.0/caching/
      - restore_cache:
          keys:
            - better-bundle-{{ checksum "Gemfile.lock" }}
            - better-bundle-

      - run: # Install Ruby dependencies
          name: Bundle Install
          command: |
            source /usr/share/rvm/scripts/rvm
            rvm use 1.8.7 --default --install
            bundle check || bundle install

      - save_cache:
          key: better-bundle-{{ checksum "Gemfile.lock" }}
          paths:
            - vendor/bundle

      # - run:
      #     name: Wait for DB
      #     command: dockerize -wait tcp://localhost:5432 -timeout 1m

      - run:
          name: Database setup
          command: |
            source /usr/share/rvm/scripts/rvm
            rvm use 1.8.7 --default --install
            cp config/database.yml.example config/database.yml
            rake db:create
            rake db:schema:load

jobs:
  unit_tests:
    executor: ruby_image
    steps:
      - setup_environment
      - run:
          name: Run unit tests
          command: |
            source /usr/share/rvm/scripts/rvm
            rvm use 1.8.7 --default --install
            bundle exec spec spec/controllers/
            bundle exec spec spec/models/
            bundle exec spec spec/lib/
            bundle exec spec spec/routing/

      - store_test_results: # https://circleci.com/docs/2.0/collect-test-data/
          path: test_results

workflows:
  version: 2
  build_and_test:
    jobs:
      - unit_tests
