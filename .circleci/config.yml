version: 2.1
executors:
  ruby_image:
    docker:
      - image: mockdeep/better:0.5
        environment:
          BUNDLE_JOBS: 3
          BUNDLE_RETRY: 3
          BUNDLE_PATH: vendor/bundle
          PGHOST: 127.0.0.1
          PGUSER: postgres
          RAILS_ENV: test
          BETTER_S3_ACCESS_KEY_ID: trash
          BETTER_S3_SECRET_ACCESS_KEY: trash
          DEBIAN_FRONTEND: noninteractive
      - image: circleci/postgres:9.2-alpine-ram
        environment:
          POSTGRES_USER: postgres
          POSTGRES_DB: app_test
          POSTGRES_PASSWORD:

    working_directory: ~/app

commands:
  setup_environment:
    steps:
      # The native checkout step can't be used here: it runs the container's
      # 2016-era git/ssh, which can't do blobless clones (git < 2.19) or
      # authenticate to GitHub with RSA keys (OpenSSH < 7.8, no rsa-sha2).
      # The repo is public, so clone over HTTPS instead.
      - run:
          name: Checkout code
          command: |
            git clone "https://github.com/mockdeep/better.git" .
            git checkout "$CIRCLE_SHA1"

      - run:
          name: Which versions?
          command: |
            ruby -v
            gem -v
            bundle -v

      - restore_cache:
          keys:
            - better-bundle-v1-{{ checksum "Gemfile.lock" }}
            - better-bundle-

      - run: # Install Ruby dependencies
          name: Bundle Install
          command: |
            bundle check || bundle install

      - save_cache:
          key: better-bundle-v1-{{ checksum "Gemfile.lock" }}
          paths:
            - vendor/bundle

      - run:
          name: Database setup
          command: |
            cp config/database.yml.example config/database.yml
            bundle exec rake db:create
            bundle exec rake db:schema:load

jobs:
  unit_tests:
    executor: ruby_image
    steps:
      - setup_environment
      - run:
          name: Run unit tests
          command: |
            bundle exec spec spec/controllers/
            bundle exec spec spec/models/
            bundle exec spec spec/lib/
            bundle exec spec spec/routing/

      - store_test_results:
          path: test_results

workflows:
  version: 2
  build_and_test:
    jobs:
      - unit_tests
